<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Serah Terima Digital-Virtual LBK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; }
            .container { 
                box-shadow: none; 
                border: none; 
                width: 100%; 
                max-width: 100%; 
                margin: 0;
                padding: 0;
            }
            input, textarea { border: none !important; outline: none !important; }
            canvas { border: none !important; }
        }
        canvas { border: 1px dashed #ccc; border-radius: 4px; cursor: crosshair; touch-action: none; }
        .input-field { border-bottom: 1px solid #e2e8f0; transition: border-color 0.3s; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="bg-gray-100 py-10 px-5">

    <div class="container mx-auto max-w-4xl bg-white p-10 shadow-lg border border-gray-200">
        <div class="text-center mb-8 border-b-2 border-black pb-4">
            <h1 class="text-2xl font-bold uppercase">Berita Acara Serah Terima (BAST)</h1>
            <p class="text-sm text-gray-600 italic">SARANA VIRTUAL LEBAK</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500">Dikirim Oleh (Personil):</label>
                    <input type="text" id="inputDikirim" class="w-full p-2 input-field font-semibold" placeholder="Nama Pengirim.(Cnth: Fazar Virtual)" oninput="updateSignNames()">
                </div>
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Nama Toko / Instansi:</label>
                        <input type="text" id="inputNamaToko" class="w-full p-2 input-field font-semibold text-blue-800" placeholder="Contoh: TKBV-FRESH DC LEBAK">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Diterima Oleh (Personil Toko):</label>
                        <input type="text" id="inputDiterima" class="w-full p-2 input-field font-semibold" placeholder="Nama Penerima.(Cnth:Fazar-2015317520)" oninput="updateSignNames()">
                    </div>
                </div>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500">Tanggal:</label>
                    <input type="date" id="tglInput" class="w-full p-2 input-field">
                </div>
            </div>
        </div>

        <div class="mb-4">
            <table class="w-full border-collapse border border-gray-400" id="tabelBarang">
                <thead>
                    <tr class="bg-gray-100 text-sm uppercase">
                        <th class="border border-gray-400 p-2 text-left">Nama Barang</th>
                        <th class="border border-gray-400 p-2 w-24">Qty</th>
                        <th class="border border-gray-400 p-2 text-left">Keterangan</th>
                    </tr>
                </thead>
                <tbody id="tbodyBarang">
                    <tr>
                        <td class="border border-gray-400 p-0"><input type="text" class="w-full p-2 outline-none" placeholder="Isi Nama Barang/Sarana..."></td>
                        <td class="border border-gray-400 p-0"><input type="number" class="w-full p-2 text-center outline-none" value="1"></td>
                        <td class="border border-gray-400 p-0"><input type="text" class="w-full p-2 outline-none" placeholder="S/N, TID, MID, dll..."></td>
                    </tr>
                </tbody>
            </table>

            <div class="mt-3 flex gap-2 no-print">
                <button onclick="tambahBaris()" class="bg-green-600 text-white px-3 py-1.5 rounded text-sm hover:bg-green-700 transition">
                    + Tambah Baris
                </button>
                <button onclick="hapusBaris()" class="bg-red-500 text-white px-3 py-1.5 rounded text-sm hover:bg-red-600 transition">
                    Hapus Baris
                </button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 text-center mt-16">
            <div class="flex flex-col items-center">
                <p class="font-bold mb-2 text-sm uppercase">Dibuat,</p>
                <canvas id="sign1" width="220" height="120" class="bg-gray-50"></canvas>
                <button onclick="clearPad('sign1')" class="no-print text-[10px] text-red-500 mt-1 uppercase underline">Hapus TTD</button>
                <p id="labelDikirim" class="mt-4 border-t border-black min-w-[150px] font-bold text-sm">( ................. )</p>
            </div>

            <div class="flex flex-col justify-between">
                <p class="font-bold text-sm uppercase">Mengetahui,</p>
                <div class="h-[120px]"></div> <p class="border-t border-black min-w-[150px] font-bold uppercase text-sm">O.M / SPV</p>
            </div>

            <div class="flex flex-col items-center">
                <p class="font-bold mb-2 text-sm uppercase">Diterima,</p>
                <canvas id="sign2" width="220" height="120" class="bg-gray-50"></canvas>
                <button onclick="clearPad('sign2')" class="no-print text-[10px] text-red-500 mt-1 uppercase underline">Hapus TTD</button>
                <p id="labelDiterima" class="mt-4 border-t border-black min-w-[150px] font-bold text-sm">( ................. )</p>
            </div>
        </div>

        <div class="mt-10 text-center no-print border-t pt-5">
            <button onclick="window.print()" class="bg-blue-700 text-white px-10 py-3 rounded-full font-bold shadow-lg hover:bg-blue-800 transition transform hover:scale-105">
                CETAK / SIMPAN PDF
            </button>
        </div>
    </div>

    <script>
        // Set tanggal hari ini secara otomatis
        document.getElementById('tglInput').valueAsDate = new Date();

        // Update Nama di TTD secara Real-time
        function updateSignNames() {
            const dikirim = document.getElementById('inputDikirim').value;
            const diterima = document.getElementById('inputDiterima').value;
            
            document.getElementById('labelDikirim').innerText = dikirim ? `( ${dikirim} )` : "( ................. )";
            document.getElementById('labelDiterima').innerText = diterima ? `( ${diterima} )` : "( ................. )";
        }

        function tambahBaris() {
            const tbody = document.getElementById("tbodyBarang");
            const row = tbody.insertRow();
            const cell1 = row.insertCell(0);
            const cell2 = row.insertCell(1);
            const cell3 = row.insertCell(2);
            const classes = "border border-gray-400 p-0";
            cell1.className = cell2.className = cell3.className = classes;
            cell1.innerHTML = '<input type="text" class="w-full p-2 outline-none" placeholder="...">';
            cell2.innerHTML = '<input type="number" class="w-full p-2 text-center outline-none" value="1">';
            cell3.innerHTML = '<input type="text" class="w-full p-2 outline-none" placeholder="...">';
        }

        function hapusBaris() {
            const tbody = document.getElementById("tbodyBarang");
            if (tbody.rows.length > 1) { tbody.deleteRow(-1); }
        }

        function setupCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let drawing = false;

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const startDrawing = (e) => { drawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); };
            const doDrawing = (e) => { if (!drawing) return; const pos = getPos(e); ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); };
            const stopDrawing = () => { drawing = false; };

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', doDrawing);
            window.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchmove', doDrawing);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function clearPad(id) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        setupCanvas('sign1');
        setupCanvas('sign2');
    </script>
</body>
</html>
